  <line x1="260" y1="140" x2="330" y2="140" stroke="#FF6600" stroke-width="0.8" opacity="0.3" stroke-dasharray="4,3"/>
  <line x1="260" y1="140" x2="610" y2="140" stroke="#FF6600" stroke-width="0.8" opacity="0.2" stroke-dasharray="4,3"/>
  <text x="290" y="135" font-family="system-ui,sans-serif" font-size="7" fill="#996633">governs</text>

